<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login - Lavanya Tool</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: #0f0f0f;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.card {
    background: #1c1c1c;
    padding: 50px;
    border-radius: 18px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 0 30px rgba(255,204,0,0.15);
    text-align: center;
}

h2 {
    color: #ffcc00;
    margin-bottom: 25px;
    font-size: 28px;
}

input {
    width: 97%;
    padding: 14px 0px;
    margin-bottom: 15px;
    border-radius: 10px;
    border: 1px solid #333;
    background: #2a2a2a;
    color: white;
    font-size: 15px;
}

input:focus {
    border-color: #ffcc00;
    outline: none;
}

button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    background: #ffcc00;
    font-weight: 600;
    cursor: pointer;
    font-size: 16px;
}

button:hover {
    background: #ffd633;
}

.link {
    margin-top: 15px;
    color: white;
    font-size: 14px;
}

.link a {
    color: #ffcc00;
    text-decoration: none;
}

input{
    padding-left:10px;
}

.flash {
    background: #2a2a2a;
    color: #ffcc00;
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 10px;
    font-size: 13px;
}
</style>
</head>

<body>

<div class="card">

    <h2>Login</h2>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for msg in messages %}
          <div class="flash">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <div class="link">
        Don't have an account? <a href="{{ url_for('auth.signup') }}">Sign up</a>
    </div>

</div>

</body>
</html>
